global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: edge-api
    static_configs:
      - targets: ['edge-api:9100']

  - job_name: identity-svc
    static_configs:
      - targets: ['identity-svc:9101']

  - job_name: event-command-svc
    static_configs:
      - targets: ['event-command-svc:9102']

  - job_name: event-query-svc
    static_configs:
      - targets: ['event-query-svc:9103']

  - job_name: report-svc
    static_configs:
      - targets: ['report-svc:9104']

  - job_name: worker
    static_configs:
      - targets: ['worker:9105']

  - job_name: nats
    metrics_path: /varz
    static_configs:
      - targets: ['nats:8222']
