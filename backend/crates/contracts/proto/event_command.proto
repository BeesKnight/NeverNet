syntax = "proto3";

package eventdesign.internal.eventcommand.v1;

message Empty {}

message Category {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string color = 4;
  string created_at = 5;
  string updated_at = 6;
}

message EventRecord {
  string id = 1;
  string user_id = 2;
  string category_id = 3;
  string title = 4;
  string description = 5;
  string location = 6;
  string starts_at = 7;
  string ends_at = 8;
  double budget = 9;
  string status = 10;
  string created_at = 11;
  string updated_at = 12;
}

message CategoryReply {
  Category category = 1;
}

message EventReply {
  EventRecord event = 1;
}

message CreateCategoryRequest {
  string user_id = 1;
  string name = 2;
  string color = 3;
}

message UpdateCategoryRequest {
  string user_id = 1;
  string category_id = 2;
  string name = 3;
  string color = 4;
}

message DeleteCategoryRequest {
  string user_id = 1;
  string category_id = 2;
}

message CreateEventRequest {
  string user_id = 1;
  string category_id = 2;
  string title = 3;
  string description = 4;
  string location = 5;
  string starts_at = 6;
  string ends_at = 7;
  double budget = 8;
  string status = 9;
}

message UpdateEventRequest {
  string user_id = 1;
  string event_id = 2;
  string category_id = 3;
  string title = 4;
  string description = 5;
  string location = 6;
  string starts_at = 7;
  string ends_at = 8;
  double budget = 9;
  string status = 10;
}

message DeleteEventRequest {
  string user_id = 1;
  string event_id = 2;
}

service EventCommandService {
  rpc CreateCategory(CreateCategoryRequest) returns (CategoryReply);
  rpc UpdateCategory(UpdateCategoryRequest) returns (CategoryReply);
  rpc DeleteCategory(DeleteCategoryRequest) returns (Empty);
  rpc CreateEvent(CreateEventRequest) returns (EventReply);
  rpc UpdateEvent(UpdateEventRequest) returns (EventReply);
  rpc DeleteEvent(DeleteEventRequest) returns (Empty);
}
