syntax = "proto3";

package eventdesign.internal.identity.v1;

message User {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string created_at = 4;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthReply {
  string token = 1;
  User user = 2;
}

message CurrentUserRequest {
  string token = 1;
}

message LogoutRequest {
  string token = 1;
}

message UserReply {
  User user = 1;
}

message UiSettings {
  string user_id = 1;
  string theme = 2;
  string accent_color = 3;
  string default_view = 4;
  string created_at = 5;
  string updated_at = 6;
}

message GetSettingsRequest {
  string user_id = 1;
}

message UpdateSettingsRequest {
  string user_id = 1;
  optional string theme = 2;
  optional string accent_color = 3;
  optional string default_view = 4;
}

message SettingsReply {
  UiSettings settings = 1;
}

message Empty {}

service IdentityService {
  rpc Register(RegisterRequest) returns (AuthReply);
  rpc Login(LoginRequest) returns (AuthReply);
  rpc Logout(LogoutRequest) returns (Empty);
  rpc GetCurrentUser(CurrentUserRequest) returns (UserReply);
  rpc GetSettings(GetSettingsRequest) returns (SettingsReply);
  rpc UpdateSettings(UpdateSettingsRequest) returns (SettingsReply);
}
