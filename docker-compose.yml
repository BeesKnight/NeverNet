services:
  db:
    image: postgres:17-alpine
    container_name: eventdesign-db
    environment:
      POSTGRES_DB: eventdesign
      POSTGRES_USER: eventdesign
      POSTGRES_PASSWORD: eventdesign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventdesign -d eventdesign"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
