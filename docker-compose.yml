name: eventdesign

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: eventdesign
      POSTGRES_USER: eventdesign
      POSTGRES_PASSWORD: eventdesign
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventdesign -d eventdesign"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8222/healthz > /dev/null || wget -q -O - http://127.0.0.1:8222/varz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventdesign
      MINIO_ROOT_PASSWORD: eventdesign123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:9000/minio/health/live > /dev/null || curl -fsS http://127.0.0.1:9000/minio/health/live > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  db-migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: db-migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      LOG_FORMAT: json
      RUST_LOG: db_migrator=info
    restart: "no"

  infra-bootstrap:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: infra-bootstrap
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: eventdesign-exports
      MINIO_ACCESS_KEY: eventdesign
      MINIO_SECRET_KEY: eventdesign123
      MINIO_REGION: us-east-1
      LOG_FORMAT: json
      RUST_LOG: infra_bootstrap=info
    restart: "no"

  identity-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: identity-svc
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-secret}
      GRPC_PORT: 50051
      METRICS_PORT: 9101
      LOG_FORMAT: json
      RUST_LOG: identity_svc=info
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nc -z 127.0.0.1 50051 && curl -fsS http://127.0.0.1:9101/healthz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  event-command-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: event-command-svc
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      GRPC_PORT: 50052
      METRICS_PORT: 9102
      LOG_FORMAT: json
      RUST_LOG: event_command_svc=info
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nc -z 127.0.0.1 50052 && curl -fsS http://127.0.0.1:9102/healthz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  event-query-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: event-query-svc
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      REDIS_URL: redis://redis:6379
      GRPC_PORT: 50053
      METRICS_PORT: 9103
      LOG_FORMAT: json
      RUST_LOG: event_query_svc=info
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nc -z 127.0.0.1 50053 && curl -fsS http://127.0.0.1:9103/healthz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  report-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: report-svc
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      infra-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      GRPC_PORT: 50054
      METRICS_PORT: 9104
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: eventdesign-exports
      MINIO_ACCESS_KEY: eventdesign
      MINIO_SECRET_KEY: eventdesign123
      MINIO_REGION: us-east-1
      LOG_FORMAT: json
      RUST_LOG: report_svc=info
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nc -z 127.0.0.1 50054 && curl -fsS http://127.0.0.1:9104/healthz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: worker
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      infra-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      METRICS_PORT: 9105
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: eventdesign-exports
      MINIO_ACCESS_KEY: eventdesign
      MINIO_SECRET_KEY: eventdesign123
      MINIO_REGION: us-east-1
      LOG_FORMAT: json
      RUST_LOG: worker=info
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9105/healthz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  demo-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: demo-seed
    profiles: ["demo"]
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      infra-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: eventdesign-exports
      MINIO_ACCESS_KEY: eventdesign
      MINIO_SECRET_KEY: eventdesign123
      MINIO_REGION: us-east-1
    restart: "no"

  edge-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: edge-api
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      identity-svc:
        condition: service_healthy
      event-command-svc:
        condition: service_healthy
      event-query-svc:
        condition: service_healthy
      report-svc:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-secret}
      PORT: 8080
      METRICS_PORT: 9100
      IDENTITY_SERVICE_URL: http://identity-svc:50051
      EVENT_COMMAND_SERVICE_URL: http://event-command-svc:50052
      EVENT_QUERY_SERVICE_URL: http://event-query-svc:50053
      REPORT_SERVICE_URL: http://report-svc:50054
      FRONTEND_ORIGINS: http://localhost:3000,http://localhost:5173
      AUTH_COOKIE_SECURE: "false"
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_REQUESTS_PER_WINDOW: 300
      AUTH_RATE_LIMIT_REQUESTS_PER_WINDOW: 20
      LOG_FORMAT: json
      RUST_LOG: edge_api=info,tower_http=info
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/health > /dev/null && curl -fsS http://127.0.0.1:9100/healthz > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      edge-api:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  minio_data:
