name: eventdesign

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: eventdesign
      POSTGRES_USER: eventdesign
      POSTGRES_PASSWORD: eventdesign
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventdesign -d eventdesign"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventdesign
      MINIO_ROOT_PASSWORD: eventdesign123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  identity-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: identity-svc
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-secret}
      GRPC_PORT: 50051
      RUST_LOG: identity_svc=info
    restart: unless-stopped

  event-command-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: event-command-svc
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      GRPC_PORT: 50052
      RUST_LOG: event_command_svc=info
    restart: unless-stopped

  event-query-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: event-query-svc
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      REDIS_URL: redis://redis:6379
      GRPC_PORT: 50053
      RUST_LOG: event_query_svc=info
    restart: unless-stopped

  report-svc:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: report-svc
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      GRPC_PORT: 50054
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: eventdesign-exports
      MINIO_ACCESS_KEY: eventdesign
      MINIO_SECRET_KEY: eventdesign123
      MINIO_REGION: us-east-1
      RUST_LOG: report_svc=info
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: eventdesign-exports
      MINIO_ACCESS_KEY: eventdesign
      MINIO_SECRET_KEY: eventdesign123
      MINIO_REGION: us-east-1
      RUST_LOG: worker=info
    restart: unless-stopped

  edge-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: edge-api
    depends_on:
      db:
        condition: service_healthy
      identity-svc:
        condition: service_started
      event-command-svc:
        condition: service_started
      event-query-svc:
        condition: service_started
      report-svc:
        condition: service_started
    environment:
      DATABASE_URL: postgres://eventdesign:eventdesign@db:5432/eventdesign
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-secret}
      PORT: 8080
      IDENTITY_SERVICE_URL: http://identity-svc:50051
      EVENT_COMMAND_SERVICE_URL: http://event-command-svc:50052
      EVENT_QUERY_SERVICE_URL: http://event-query-svc:50053
      REPORT_SERVICE_URL: http://report-svc:50054
      FRONTEND_ORIGINS: http://localhost:3000,http://localhost:5173
      AUTH_COOKIE_SECURE: "false"
      RUST_LOG: edge_api=info,tower_http=info
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - edge-api
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
